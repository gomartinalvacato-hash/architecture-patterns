<title>Architecture Pattern Catalog</title>

<style>

/* =====================================================
   BBVA Architecture Patterns Portal
===================================================== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #F4F6F9;
    color: #2C3E50;
}

/* =====================================================
   HEADER
===================================================== */

header {
    background: #072146;
    color: white;
    padding: 28px 50px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

header h1 {
    font-size: 30px;
    font-weight: 600;
}

header p {
    margin-top: 8px;
    color: #C6D4E1;
    font-size: 15px;
}

/* =====================================================
   NAVIGATION
===================================================== */

nav {
    background: white;
    display: flex;
    gap: 15px;
    padding: 18px 50px;
    border-bottom: 1px solid #E4E7EB;
}

.tab {
    border: none;
    background: white;
    color: #072146;
    cursor: pointer;
    padding: 12px 18px;
    font-size: 15px;
    font-weight: 600;
    border-bottom: 3px solid transparent;
    transition: .25s;
}

.tab:hover {
    color: #1973B8;
    border-bottom: 3px solid #1973B8;
}

.tab.active {
    color: #1973B8;
    border-bottom: 3px solid #1973B8;
}

/* =====================================================
   MAIN
===================================================== */

main {
    padding: 35px 50px;
}

#patterns {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(470px, 1fr));
    gap: 24px;
}

/* =====================================================
   MAIN CARD
===================================================== */

.card {
    background: white;
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 4px 14px rgba(0,0,0,.08);
    display: flex;
    flex-direction: column;
    gap: 18px;
    transition: .2s;
}

.card:hover {
    transform: translateY(-3px);
}

/* =====================================================
   HEADER CARD
===================================================== */

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 15px;
}

.card-title {
    color: #072146;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
}

.subfamily {
    color: #6B7280;
    font-size: 14px;
}

/* =====================================================
   STATUS
===================================================== */

.status {
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 16px;
    white-space: nowrap;
}

.publicado {
    background: #DDF4E4;
    color: #207245;
}

.curso {
    background: #FFF3D9;
    color: #A05B00;
}

.revision {
    background: #ECECEC;
    color: #666666;
}

/* =====================================================
   DESCRIPTION
===================================================== */

.description {
    line-height: 1.6;
    color: #4B5563;
    font-size: 14px;
}

/* =====================================================
   SECTION TITLES
===================================================== */

.section-title {
    color: #072146;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px;
}

/* =====================================================
   PARTICIPANTS
===================================================== */

.tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.tag {
    background: #EDF3FA;
    color: #072146;
    border-radius: 16px;
    padding: 6px 10px;
    font-size: 12px;
}

/* =====================================================
   DOCUMENT BUTTON
===================================================== */

.document a {
    display: inline-block;
    background: #1973B8;
    color: white;
    text-decoration: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 14px;
    transition: .2s;
}

.document a:hover {
    background: #0D5E99;
}

/* =====================================================
   RESOURCES GRID
===================================================== */

.resources-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
    margin-top: 12px;
}

/* =====================================================
   RESOURCE CARD
===================================================== */

.resource-card {
    display: block;
    padding: 18px;
    border: 1px solid #E1E5EB;
    border-radius: 10px;
    background: #FFFFFF;
    color: inherit;
    text-decoration: none;
    transition: all .2s ease;
}

.resource-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 18px rgba(0, 0, 0, .08);
    border-color: #1973B8;
}

.resource-card-content {
    display: flex;
    gap: 12px;
    align-items: flex-start;
}

.resource-icon {
    font-size: 20px;
    color: #1973B8;
    flex-shrink: 0;
}

.resource-card h5 {
    margin: 0 0 8px 0;
    color: #072146;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
}

.resource-card p {
    margin: 0;
    font-size: 13px;
    line-height: 1.5;
    color: #6B7280;
}

/* =====================================================
   EMPTY
===================================================== */

.empty {
    color: #6B7280;
    font-size: 18px;
}

/* =====================================================
   RESPONSIVE
===================================================== */

@media (max-width: 768px) {

    header {
        padding: 24px;
    }

    nav {
        padding: 15px 24px;
        overflow-x: auto;
    }

    main {
        padding: 24px;
    }

    #patterns {
        grid-template-columns: 1fr;
    }

    .card-header {
        flex-direction: column;
    }

}

</style>


</head>

<script>

    let patterns = [];

    let currentDiscipline = "GenAI";

    function loadPatterns() {

        const json = document.getElementById("patterns-data").textContent;

        patterns = JSON.parse(json);

        renderPatterns();

    }

    loadPatterns();

    // -------------------------------
    // Tabs
    // -------------------------------

    document.querySelectorAll(".tab").forEach(tab => {

        tab.addEventListener("click", () => {

            document.querySelectorAll(".tab").forEach(t => {

                t.classList.remove("active");

            });

            tab.classList.add("active");

            currentDiscipline = tab.dataset.discipline;

            renderPatterns();

        });

    });

    // -------------------------------
    // Status color
    // -------------------------------

    function getStatusClass(status) {

        switch(status) {

            case "Publicado":
                return "publicado";

            case "En curso":
                return "curso";

            default:
                return "revision";

        }

    }

    // -------------------------------
    // Render cards
    // -------------------------------

    function renderPatterns() {

        const container = document.getElementById("patterns");

        container.innerHTML = "";

        const filtered = patterns.filter(

            pattern => pattern.discipline === currentDiscipline

        );

        if(filtered.length === 0) {

            container.innerHTML = `
                <div class="empty">
                    No patterns available.
                </div>
            `;

            return;

        }

        filtered.forEach(pattern => {

            const participants = pattern.participants.map(team =>

                `<span class="tag">${team}</span>`

            ).join("");

            const resources = pattern.resources.map(resource =>

                `
                <a
                    href="${resource.url}"
                    class="resource-card"
                    target="_blank"
                    rel="noopener noreferrer"
                >

                    <div class="resource-card-content">

                        <div class="resource-icon">
                            ↗
                        </div>

                        <div>

                            <h5>
                                ${resource.name}
                            </h5>

                            <p>
                                ${resource.description || "Test"}
                            </p>

                        </div>

                    </div>

                </a>
                `

            ).join("");

            const card = document.createElement("div");

            card.className = "card";

            card.innerHTML = `

                <div class="card-header">

                    <div>

                        <h2 class="card-title">

                            ${pattern.title}

                        </h2>

                        <div class="subfamily">

                            ${pattern.subcategory}

                        </div>

                    </div>

                    <div class="status ${getStatusClass(pattern.status)}">

                        ${pattern.status}

                    </div>

                </div>

                <div class="description">

                    ${pattern.description}

                </div>

                <div>

                    <div class="section-title">

                        Participants

                    </div>

                    <div class="tags">

                        ${participants}

                    </div>

                </div>

                <div>

                    <div class="section-title">

                        Document

                    </div>

                    <div class="document">

                        <a
                            href="${pattern.document.url}"
                            target="_blank"
                            rel="noopener noreferrer"
                        >

                            📄 ${pattern.document.name}

                        </a>

                    </div>

                </div>

                ${
                    pattern.resources.length > 0
                    ?
                    `

                    <div>

                        <div class="section-title">

                            Resources

                        </div>

                        <div class="resources-grid">

                            ${resources}

                        </div>

                    </div>

                    `
                    :
                    ""

                }

            `;

            container.appendChild(card);

        });

    }

</script>
