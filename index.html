    /* =====================================================
   BBVA Architecture Patterns Portal
===================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:"Segoe UI", Arial, sans-serif;
    background:#F4F6F9;
    color:#2C3E50;

/* =====================================================
   HEADER
===================================================== */

header{

    background:#072146;
    color:white;
    padding:28px 50px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);

}

header h1{

    font-size:30px;
    font-weight:600;

}

header p{

    margin-top:8px;
    color:#C6D4E1;
    font-size:15px;

}

/* =====================================================
   NAVIGATION
===================================================== */

nav{

    background:white;

    display:flex;

    gap:15px;

    padding:18px 50px;

    border-bottom:1px solid #E4E7EB;

}

.tab{

    border:none;

    background:white;

    color:#072146;

    cursor:pointer;

    padding:12px 18px;

    font-size:15px;

    font-weight:600;

    border-bottom:3px solid transparent;

    transition:.25s;

}

.tab:hover{

    color:#1973B8;

    border-bottom:3px solid #1973B8;

}

.tab.active{

    color:#1973B8;

    border-bottom:3px solid #1973B8;

}

/* =====================================================
   MAIN
===================================================== */

main{

    padding:35px 50px;

}

#patterns{

    display:grid;

    grid-template-columns:repeat(auto-fill,minmax(470px,1fr));

    gap:24px;

}

/* =====================================================
   CARD
===================================================== */

.card{

    background:white;

    border-radius:14px;

    padding:24px;

    box-shadow:0 4px 14px rgba(0,0,0,.08);

    display:flex;

    flex-direction:column;

    gap:18px;

    transition:.2s;

}

.card:hover{

    transform:translateY(-3px);

}

/* =====================================================
   HEADER CARD
===================================================== */

.card-header{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    gap:15px;

}

.card-title{

    color:#072146;

    font-size:22px;

    font-weight:600;

    margin-bottom:6px;

}

.subfamily{

    color:#6B7280;

    font-size:14px;

}

/* =====================================================
   STATUS
===================================================== */

.status{

    font-size:12px;

    font-weight:600;

    padding:6px 12px;

    border-radius:16px;

    white-space:nowrap;

}

.publicado{

    background:#DDF4E4;

    color:#207245;

}

.curso{

    background:#FFF3D9;

    color:#A05B00;

}

.revision{

    background:#ECECEC;

    color:#666666;

}

/* =====================================================
   DESCRIPTION
===================================================== */

.description{

    line-height:1.6;

    color:#4B5563;

    font-size:14px;

}

/* =====================================================
   SECTION TITLES
===================================================== */

.section-title{

    color:#072146;

    font-size:14px;

    font-weight:600;

    margin-bottom:10px;

}

/* =====================================================
   PARTICIPANTS
===================================================== */

.tags{

    display:flex;

    flex-wrap:wrap;

    gap:8px;

}

.tag{

    background:#EDF3FA;

    color:#072146;

    border-radius:16px;

    padding:6px 10px;

    font-size:12px;

}

/* =====================================================
   DOCUMENT BUTTON
===================================================== */

.document a{

    display:inline-block;

    background:#1973B8;

    color:white;

    text-decoration:none;

    padding:10px 16px;

    border-radius:6px;

    font-size:14px;

    transition:.2s;

}

.document a:hover{

    background:#0D5E99;

}

/* =====================================================
   RESOURCES
===================================================== */

.resources{

    padding-left:18px;

}

.resources li{

    margin-bottom:8px;

}

.resources a{

    color:#1973B8;

    text-decoration:none;

}

.resources a:hover{

    text-decoration:underline;

}

/* =====================================================
   EMPTY
===================================================== */

.empty{

    color:#6B7280;

    font-size:18px;

}

    </style>

    <script>

    let patterns = [];
let currentDiscipline = "GenAI";

function loadPatterns() {

    const json = document.getElementById("patterns-data").textContent;

    patterns = JSON.parse(json);

    renderPatterns();

}

loadPatterns();
// -------------------------------
// Tabs
// -------------------------------

document.querySelectorAll(".tab").forEach(tab => {

    tab.addEventListener("click", () => {

        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

        tab.classList.add("active");

        currentDiscipline = tab.dataset.discipline;

        renderPatterns();

    });

});

// -------------------------------
// Status color
// -------------------------------

function getStatusClass(status){

    switch(status){

        case "Publicado":
            return "publicado";

        case "En curso":
            return "curso";

        default:
            return "revision";

    }

}

// -------------------------------
// Render cards
// -------------------------------

function renderPatterns(){

    const container = document.getElementById("patterns");

    container.innerHTML = "";

    const filtered = patterns.filter(pattern => pattern.discipline === currentDiscipline);

    if(filtered.length === 0){

        container.innerHTML = `
            <div class="empty">
                No patterns available.
            </div>
        `;

        return;

    }

    filtered.forEach(pattern => {

        const participants = pattern.participants.map(team =>

            `<span class="tag">${team}</span>`

        ).join("");

        const resources = pattern.resources.map(resource =>

            `
            <li>
                <a href="${resource.url}" target="_blank">
                    ${resource.name}
                </a>
            </li>
            `

        ).join("");

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `

            <div class="card-header">

                <div>

                    <h2 class="card-title">

                        ${pattern.title}

                    </h2>

                    <div class="subfamily">

                        ${pattern.subcategory}

                    </div>

                </div>

                <div class="status ${getStatusClass(pattern.status)}">

                    ${pattern.status}

                </div>

            </div>

            <div class="description">

                ${pattern.description}

            </div>

            <div>

                <div class="section-title">

                    Participants

                </div>

                <div class="tags">

                    ${participants}

                </div>

            </div>

            <div>

                <div class="section-title">

                    Document

                </div>

                <div class="document">

                    <a href="${pattern.document.url}" target="_blank">

                        📄 ${pattern.document.name}

                    </a>

                </div>

            </div>
            
            ${
                pattern.resources.length > 0
                ?
                `
                <div>

                    <div class="section-title">

                        Resources

                    </div>

                    <ul class="resources">

                        ${resources}

                    </ul>

                </div>
                `
                :
                ""
            }

        `;

        container.appendChild(card);

    });

}
    </script>
